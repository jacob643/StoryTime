<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story Time!</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="history">
    </div>
    <div class="container">
		<div class="radio-group">
			<label>
				<input type="radio" name="speedType" value="cpm" checked />
				CPM
			</label>
			<label>
				<input type="radio" name="speedType" value="wpm" />
				WPM
			</label>
			<label for="characterAmountInput">
				<span id="characterAmount"></span>
			</label>
			<input id="characterAmountInput" value="20" />
			<textarea id="possibleCharactersInput" rows="3" cols="100">ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!"/$%?&*()_-+=Г ГўГӨГ©ГЁГӘГ«Г®ГҜГҙГ№Г»ГјГ§ГҖГӮГ„ГүГҲГҠГӢГҺГҸГ”ГҷГӣГңГҮ</textarea>
		</div>
        <div class="container">
            <input type="text" id="initialPrompt" placeholder="Enter initial prompt here..." />
            <button id="restartButton">Send</button>
        </div>

        <button id="settingsToggle">вҡҷ Settings</button>
        <a id="setupLink" href="/getting_started.html" target="_blank">Setup</a>

        <div id="settingsPanel" class="collapsed">
            <section>
                <h3>Scoring Mode</h3>
                <label>Mode
                    <select id="optScoringMode">
                        <option value="split">Adaptive (split)</option>
                        <option value="fixed">Fixed thresholds</option>
                    </select>
                </label>
            </section>
            <section>
                <h3>Adaptive Params</h3>
                <label>Min data points <input type="number" id="optMinData" step="1" min="1" /></label>
                <label>Min stddev (CPM) <input type="number" id="optMinStddev" step="0.5" min="0" /></label>
                <label>Пғ tier 0 <input type="number" id="optTier0Sigma" step="0.1" /></label>
                <label>Пғ tier 1 <input type="number" id="optTier1Sigma" step="0.1" /></label>
                <label>Пғ tier 2 <input type="number" id="optTier2Sigma" step="0.1" /></label>
                <label>Пғ tier 3 <input type="number" id="optTier3Sigma" step="0.1" /></label>
            </section>
            <section>
                <h3>Fixed Thresholds (low, high CPM)</h3>
                <div id="fixedThresholdsContainer"></div>
            </section>
            <section>
                <h3>Split Sizes</h3>
                <label>Target (chars) <input type="number" id="optTargetSplit" step="1" min="10" /></label>
                <label>Minimum (chars) <input type="number" id="optMinSplit" step="1" min="1" /></label>
            </section>
            <section>
                <h3>Default CPM</h3>
                <label>Default avg <input type="number" id="optDefaultAvgCpm" step="5" min="1" /></label>
            </section>
            <section>
                <h3>Tier Prompts</h3>
                <label>Tier 0 (very negative)
                    <textarea id="optDirection0" rows="2"></textarea>
                </label>
                <label>Tier 1 (negative)
                    <textarea id="optDirection1" rows="2"></textarea>
                </label>
                <label>Tier 2 (neutral)
                    <textarea id="optDirection2" rows="2"></textarea>
                </label>
                <label>Tier 3 (positive)
                    <textarea id="optDirection3" rows="2"></textarea>
                </label>
                <label>Tier 4 (very positive)
                    <textarea id="optDirection4" rows="2"></textarea>
                </label>
            </section>
            <div class="settings-actions">
                <button id="saveSettings">Save</button>
                <button id="resetSettings">Reset to Defaults</button>
            </div>
        </div>

        <div id="llmResponse"></div>

        <div class="container">
            <div id="message"></div>
            <div id="timeTaken"></div>
            <div id="speed"></div>
        </div>
        <div id="textDisplay">Type this.</div>
        <input type="text" id="inputBox" placeholder="Start typing here..." />
    </div>

<script src="script.js"></script>

</body>
</html>
