<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story Time!</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="gameLayout">
    <div id="storyContext">
        <h3>Story Context</h3>
        <p id="lastParagraph"></p>
    </div>
    <div class="container">

        <div id="topBar">
            <button id="settingsToggle">⚙ Settings</button>
            <button id="setupLink">📖 Setup</button>
        </div>

        <div id="initialPromptContainer">
            <input type="text" id="initialPrompt" placeholder='e.g. a skateboard with a soul trying to find its home' />
            <button id="restartButton">Start a new story</button>
        </div>

        <div id="retryContainer">
            <button id="retryButton" disabled>Retry paragraph</button>
        </div>

        <div id="settingsPanel" class="collapsed">
            <div id="settingsSections">
                <section>
                    <h3>Appearance</h3>
                    <label><input type="checkbox" id="optDarkMode" /> Dark mode</label>
                </section>
                <section>
                    <h3>Speed Display</h3>
                    <label><input type="radio" name="speedType" value="cpm" checked /> CPM (chars/min)</label>
                    <label><input type="radio" name="speedType" value="wpm" /> WPM (words/min)</label>
                </section>
                <section>
                    <h3>Word Count</h3>
                    <label>Words per paragraph <input type="number" id="wordCountInput" step="5" min="10" /></label>
                </section>
                <section>
                    <h3>Scoring Mode</h3>
                    <label>Mode
                        <select id="optScoringMode">
                            <option value="split">Adaptive (split)</option>
                            <option value="fixed">Fixed thresholds</option>
                        </select>
                    </label>
                </section>
                <section>
                    <h3>Adaptive Params</h3>
                    <label>Min stddev per 50‑char split (CPM) <input type="number" id="optMinStddev" step="0.5" min="0" /></label>
                    <label>σ tier 0 <input type="number" id="optTier0Sigma" step="0.1" /></label>
                    <label>σ tier 1 <input type="number" id="optTier1Sigma" step="0.1" /></label>
                    <label>σ tier 2 <input type="number" id="optTier2Sigma" step="0.1" /></label>
                    <label>σ tier 3 <input type="number" id="optTier3Sigma" step="0.1" /></label>
                </section>
                <section>
                    <h3>Fixed Thresholds (low, high CPM)</h3>
                    <div id="fixedThresholdsContainer"></div>
                </section>
                <section>
                    <h3>Split Sizes</h3>
                    <label>Target (chars) <input type="number" id="optTargetSplit" step="1" min="10" /></label>
                    <label>Minimum (chars) <input type="number" id="optMinSplit" step="1" min="1" /></label>
                </section>
                <section>
                    <h3>Default CPM</h3>
                    <label>Default avg <input type="number" id="optDefaultAvgCpm" step="5" min="1" /></label>
                </section>
                <section>
                    <h3>Tier Prompts</h3>
                    <label>Tier
                        <select id="tierPromptSelector">
                            <option value="4">4 (very positive)</option>
                            <option value="3">3 (positive)</option>
                            <option value="2">2 (neutral)</option>
                            <option value="1">1 (negative)</option>
                            <option value="0">0 (very negative)</option>
                        </select>
                    </label>
                    <div id="tierPromptList"></div>
                </section>
            </div>
            <div class="settings-actions">
                <button id="saveSettings">Save</button>
                <button id="resetSettings">Reset to Defaults</button>
            </div>
        </div>

        <div id="message"></div>
        <div id="textDisplayContainer"><div id="textDisplay">Type this.</div></div>
        <input type="text" id="inputBox" placeholder="Start typing here..." />
    </div>
    <div id="history">
        <div id="tierChart">
            <div class="tier-segment" data-tier="4">very positive</div>
            <div class="tier-boundary" data-index="3"></div>
            <div class="tier-segment" data-tier="3">positive</div>
            <div class="tier-boundary" data-index="2"></div>
            <div class="tier-segment" data-tier="2">neutral</div>
            <div class="tier-boundary" data-index="1"></div>
            <div class="tier-segment" data-tier="1">negative</div>
            <div class="tier-boundary" data-index="0"></div>
            <div class="tier-segment" data-tier="0">very negative</div>
        </div>
        <h3>History</h3>
        <div id="historyEntries"></div>
    </div>
</div>

<script src="script.js"></script>

</div>
</body>
</html>
