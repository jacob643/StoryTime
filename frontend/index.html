<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story Time!</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <script>
    (function() {
        var stored = localStorage.getItem('storytime-dark-mode');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored !== null ? stored === '1' : prefersDark) {
            document.documentElement.classList.add('dark-mode');
        }
    })();
    </script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="gameLayout">
    <div id="storyContext">
        <h3>Story Context</h3>
        <p id="lastParagraph"></p>
    </div>
    <div class="container">

        <div id="topBar">
            <button id="settingsToggle">⚙ Settings</button>
            <button id="setupLink">📖 Setup</button>
        </div>

        <div id="settingsPanel" class="collapsed">
            <div id="settingsSections">
                <section>
                    <h3>Appearance</h3>
                    <label><input type="checkbox" id="optDarkMode" /> Dark mode</label>
                </section>
                <section>
                    <h3>Speed Display</h3>
                    <label><input type="radio" name="speedType" value="cpm" checked /> CPM (chars/min)</label>
                    <label><input type="radio" name="speedType" value="wpm" /> WPM (words/min)</label>
                </section>
                <section>
                    <h3>Word Count</h3>
                    <label>Words per paragraph <input type="number" id="wordCountInput" step="5" min="10" /><button class="default-btn" data-field="wordCountInput" data-default="40">default: 40</button></label>
                </section>
                <section>
                    <h3>Scoring Mode</h3>
                    <label>Mode
                        <select id="optScoringMode">
                            <option value="split">Adaptive (split)</option>
                            <option value="fixed">Fixed thresholds</option>
                        </select>
                        <button class="default-btn" data-field="optScoringMode" data-default="split">default: split</button>
                    </label>
                </section>
                <section id="sectionAdaptiveParams">
                    <h3>Adaptive Params</h3>
                    <label>Min stddev per 50‑char split (<span id="optMinStddevUnit">CPM</span>) <input type="number" id="optMinStddev" step="0.5" min="0" /><button class="default-btn" data-field="optMinStddev" data-default-cpm="10">default: 10 CPM</button></label>
                    <label>σ tier 3 <input type="number" id="optTier3Sigma" step="0.1" /><button class="default-btn" data-field="optTier3Sigma" data-default="1.5">default: 1.5</button></label>
                    <label>σ tier 2 <input type="number" id="optTier2Sigma" step="0.1" /><button class="default-btn" data-field="optTier2Sigma" data-default="0.5">default: 0.5</button></label>
                    <label>σ tier 1 <input type="number" id="optTier1Sigma" step="0.1" /><button class="default-btn" data-field="optTier1Sigma" data-default="-0.5">default: -0.5</button></label>
                    <label>σ tier 0 <input type="number" id="optTier0Sigma" step="0.1" /><button class="default-btn" data-field="optTier0Sigma" data-default="-1.5">default: -1.5</button></label>
                </section>
                <section id="sectionFixedThresholds">
                    <h3>Fixed Thresholds (tier boundaries)</h3>
                    <div id="fixedThresholdsContainer"></div>
                </section>
                <section>
                    <h3>Split Sizes</h3>
                    <label>Target (chars) <input type="number" id="optTargetSplit" step="1" min="10" /><button class="default-btn" data-field="optTargetSplit" data-default="50">default: 50</button></label>
                    <label>Minimum (chars) <input type="number" id="optMinSplit" step="1" min="1" /><button class="default-btn" data-field="optMinSplit" data-default="30">default: 30</button></label>
                </section>
                <section>
                    <h3>Tier Prompts</h3>
                    <label>Tier
                        <select id="tierPromptSelector">
                            <option value="4">4 (very positive)</option>
                            <option value="3">3 (positive)</option>
                            <option value="2">2 (neutral)</option>
                            <option value="1">1 (negative)</option>
                            <option value="0">0 (very negative)</option>
                        </select>
                    </label>
                    <div id="tierPromptList"></div>
                </section>
                <section>
                    <h3>LLM Settings</h3>
                    <label>Temperature <input type="number" id="optTemperature" step="0.05" min="0" value="2" /><button class="default-btn" data-field="optTemperature" data-default="2">default: 2</button></label>
                </section>
            </div>
            <div class="settings-actions">
                <button id="saveSettings">Save</button>
                <button id="resetSettings">Reset to Defaults</button>
            </div>
        </div>

        <div id="initialPromptContainer">
            <input type="text" id="initialPrompt" placeholder='e.g. a skateboard with a soul trying to find its home' />
            <button id="restartButton">Start a new story</button>
        </div>

        <div id="messageRow">
            <div id="message"></div>
            <button id="retryButton" disabled>Retry paragraph</button>
        </div>
        <div id="textDisplayContainer"><div id="textDisplay">Type this.</div></div>
        <input type="text" id="inputBox" placeholder="Start typing here..." />
    </div>
    <div id="history">
        <div id="tierChart">
            <div class="tier-segment" data-tier="4">very positive</div>
            <div class="tier-boundary" data-index="3"></div>
            <div class="tier-segment" data-tier="3">positive</div>
            <div class="tier-boundary" data-index="2"></div>
            <div class="tier-segment" data-tier="2">neutral</div>
            <div class="tier-boundary" data-index="1"></div>
            <div class="tier-segment" data-tier="1">negative</div>
            <div class="tier-boundary" data-index="0"></div>
            <div class="tier-segment" data-tier="0">very negative</div>
        </div>
        <h3>History</h3>
        <div id="historyEntries"></div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
