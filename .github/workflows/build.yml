name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install .
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build binary
        run: python scripts/build.py --skip-smoke
      - uses: actions/upload-artifact@v4
        with:
          name: storytime-${{ runner.os }}
          path: dist/*
