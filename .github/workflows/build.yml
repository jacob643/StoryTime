name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macOS
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install .
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build binary
        run: python scripts/build.py --skip-smoke
      - name: Organize binary into platform folder
        run: |
          mkdir -p "dist/${{ matrix.platform }}"
          mv dist/StoryTime* "dist/${{ matrix.platform }}/"
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: storytime-${{ runner.os }}
          path: dist/*
