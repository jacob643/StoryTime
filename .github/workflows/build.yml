name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macOS
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install .
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build binary
        run: python scripts/build.py --skip-smoke
      - name: Rename binary with platform suffix
        run: |
          mv dist/StoryTime* "dist/StoryTime-${{ matrix.platform }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: storytime-${{ runner.os }}
          path: dist/*
